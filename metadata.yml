title: Video8 Commercial Releases Database
description: >
  A collaborative database documenting home video releases on the Video8 format.
  Video8 was a consumer magnetic tape format introduced by Sony in 1984.
  Japan produced the majority of known releases. The earliest US releases were 1986.
  Releases were mainly feature films, but also music, video magazines, and other categories. 
source: github.com/rikker/video8
license: CC0
license_url: https://creativecommons.org/publicdomain/zero/1.0/

databases:
  video8:
    tables:
      releases:
        label_column: catalog_number
        searchmode: fulltext
        columns:
          id: ID
          title_id: Title
          publisher_id: Publisher
          title_release: Release Title
          catalog_number: Catalog No.
          release_date: Release Date
          country: Country
          encoding: Encoding
          runtime_mins: Runtime (mins)
          list_price: List Price
          upc: UPC
          isbn: ISBN
          audio_format: Audio Format
          audio_language: Audio Language
          audio_dubbed: Dubbed
          subtitle_language: Subtitles / CC
          promo: Promo
          notes: Notes
        facets:
          - country
          - encoding
          - audio_format
          - audio_language
          - audio_dubbed
          - subtitle_language
          - promo
          - publisher_id

      titles:
        label_column: title
        searchmode: fulltext
        columns:
          id: ID
          title: Title
          title_ja: Japanese Title
          year: Year
          content_type: Content Type
          country_origin: Country of Origin
        facets:
          - content_type
          - country_origin
          - year

      publishers:
        label_column: name
        columns:
          id: ID
          name: Publisher Name
          country: Country
          parent_id: Parent Entity
          notes: Notes
        facets:
          - country

      catalogs:
        label_column: title
        columns:
          id: ID
          title: Catalog Title
          year: Year
          publisher_id: Publisher
          notes: Notes
          scan_url: Scan URL

      sources:
        columns:
          id: ID
          release_id: Release
          source_type: Source Type
          url: URL
          catalog_id: Catalog
          catalog_locator: Locator
          notes: Notes
        facets:
          - source_type

      images:
        columns:
          id: ID
          release_id: Release
          side: Side
          filename: Filename
          notes: Notes
        facets:
          - side
